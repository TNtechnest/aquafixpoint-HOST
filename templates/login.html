<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles2.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/style23.css') }}">
</head>
<body>

<div class="containerlg"><div class="drop">
			<div class="content">
    <div class="container mt-5">
        <h1 class="mb-4">Login</h1>
        <form method="POST" action="{{ url_for('login') }}">
            {{ form.hidden_tag() }}
            <div class="form-group">

             <input class="form-control" id="email" name="email" placeholder="Enter email" required="" type="text" value="">
            </div>
            <div class="form-group">
               <input class="form-control" id="password" name="password" placeholder="Enter password" required="" type="password" value="">
            </div>
            <div class="form-group">
                
                {{ form.user_type(class="form-control") }}
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        </div>
			</div>
		</div>
        {% if form.errors %}
            <div class="alert alert-danger mt-3">
                {{ form.errors }}
            </div>
        {% endif %}
    </div>
</div>
</body>
</html>
