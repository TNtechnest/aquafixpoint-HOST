<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style23.css') }}">
</head>
<body>
<div id="notificationContainer"></div>
    <div class="dashboard">
       <nav class="sidebar">
    <div class="sidebar-header">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo" class="logo">
        <h2>AquaFixPoint</h2>
    </div>
    <ul class="nav-links">
        <li  class="active" data-page="admin_dashboard"><a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-home"></i>Dashboard</a></li>
       <li data-page="Area"><a href="{{ url_for('manage_areas') }}"><i class="fas fa-shopping-cart"></i>Area</a></li>
        <li data-page="Contacts"><a href="{{ url_for('manage_contacts') }}"><i class="fas fa-users"></i>Contacts</a></li>
        <li data-page="Initiate call"><a href="{{ url_for('initiate_call') }}"><i class="fas fa-cog"></i>Initiate call</a></li>
        <li  data-page="Call Logs"><a href="{{ url_for('call_logs') }}"><i class="fas fa-chart-line"></i>Call Logs</a></li>
        <li data-page="report"><a href="{{ url_for('report') }}"><i class="fas fa-box"></i>Report</a></li>
        <li data-page="feedback"><a href="{{ url_for('feedback') }}"><i class="fas fa-box"></i>Feedback</a></li>
    </ul>
           <a href="{{ url_for('logout') }}" class="btn btn-danger mt-3">Logout</a>
</nav>
        <main class="main-content">

        <div id="dashboard" class="page-content active">
                <h1>Dashboard Overview</h1>
                <div class="stats-grid">
                    <div class="stat-card glow">
                        <i class="fas fa-users"></i>
                        <div class="stat-info">
                            <h3>Total Areas</h3>
                            <p>50</p>
                        </div>
                    </div>
                    <div class="stat-card glow">
                        <i class="fas fa-shopping-bag"></i>
                        <div class="stat-info">
                            <h3>Total Contacts</h3>
                            <p>500</p>
                        </div>
                    </div>
                    <div class="stat-card glow">
                        <i class="fas fa-chart-line"></i>
                        <div class="stat-info">
                            <h3>Complaint </h3>
                            <p>0</p>
                        </div>
                    </div>
                    <div class="stat-card glow">
                        <i class="fas fa-percent"></i>
                        <div class="stat-info">
                            <h3>Complaint Solve</h3>
                            <p>0</p>
                        </div>
                    </div>
                </div>
                <div class="charts-container">
                    <div class="chart-card glow">
                        <h3>Water level</h3>
                        <div id="salesChart"></div>
                    </div>
                    <div class="chart-card glow">
                        <h3>Water released</h3>
                        <div id="userGrowthChart"></div>
                    </div>
                </div>
                <div class="data-tables">
                    <div class="table-card glow">
                        <h3>Areas</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Area</th>
                                    <th>Call Longs</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="recentOrdersBody"></tbody>
                        </table>
                    </div>

</main>


</body>
</html>
